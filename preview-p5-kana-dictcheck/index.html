<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <title>かなラダー 辞書チェック（テストモード）</title>
    <style>
      :root { --bg:#0f1220; --card:#1a1e33; --fg:#eef1ff; --muted:#9aa3c7; --line:#2b3152; --primary:#6f7bff; --primary-fg:#fff; --ok:#2da44e; --warn:#ffcf5c; --ng:#ff6b6b; }
      @media (prefers-color-scheme: light){ :root{ --bg:#f4f6ff; --card:#fff; --fg:#16182b; --muted:#5b638a; --line:#dfe3f5; --primary:#4a56e2; --primary-fg:#fff; --ok:#1a7f37; --warn:#b8860b; --ng:#c0392b; } }
      *{box-sizing:border-box} html,body{margin:0}
      body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Hiragino Sans","Yu Gothic",system-ui,sans-serif;line-height:1.6;-webkit-text-size-adjust:100%}
      .app{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 24px)}
      h1{font-size:1.15rem;margin:0 0 4px}
      .sub{color:var(--muted);font-size:.85rem;margin:0 0 16px}
      .in{width:100%;min-height:56px;font-size:1.6rem;text-align:center;letter-spacing:.2em;border:1.5px solid var(--line);border-radius:14px;background:var(--card);color:var(--fg);padding:10px}
      .in:focus{outline:none;border-color:var(--primary)}
      .status{color:var(--muted);font-size:.82rem;margin:8px 2px 0}
      .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px}
      .badge{display:inline-block;font-weight:700;font-size:.95rem;padding:4px 12px;border-radius:999px;margin-bottom:10px}
      .b-ok{background:rgba(45,164,78,.16);color:var(--ok);border:1px solid var(--ok)}
      .b-oos{background:rgba(255,207,92,.14);color:var(--warn);border:1px solid var(--warn)}
      .b-ng{background:rgba(255,107,107,.14);color:var(--ng);border:1px solid var(--ng)}
      .b-unk{background:var(--line);color:var(--muted);border:1px solid var(--line)}
      .row{display:flex;gap:8px;margin-top:6px}
      .k{color:var(--muted);flex:0 0 3.5em}
      .v{font-weight:600}
      .acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
      .btn{min-height:44px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--line);background:transparent;color:var(--fg);font-size:.95rem;cursor:pointer}
      .btn.sel{border-color:var(--primary);background:rgba(111,123,255,.14)}
      .btn-danger{border-color:var(--ng);color:var(--ng)}
      .edit{margin-top:14px;display:none}
      .edit label{display:block;color:var(--muted);font-size:.82rem;margin:10px 0 4px}
      .edit input,.edit textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;background:transparent;color:var(--fg);padding:10px;font:inherit}
      .send{width:100%;min-height:48px;margin-top:14px;border-radius:12px;border:1px solid var(--primary);background:var(--primary);color:var(--primary-fg);font-weight:700;font-size:1rem;cursor:pointer}
      .send.danger{background:var(--ng);border-color:var(--ng)}
      .rec{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
      .chip{font-size:.85rem;border:1px solid var(--line);border-radius:999px;padding:4px 10px;background:transparent;color:var(--fg);cursor:pointer}
      .hint{color:var(--muted);font-size:.8rem;margin-top:14px}
    </style>
  </head>
  <body>
    <main class="app">
      <h1>辞書チェック（テストモード）</h1>
      <p class="sub">3文字のひらがな読みを入れると辞書での扱いが分かり、そのまま追加・意味変更・表記変更・削除も依頼できます。長音「ー」も1文字。</p>
      <input id="q" class="in" inputmode="kana" autocomplete="off" autocapitalize="off" placeholder="れい：さくら" />
      <div id="status" class="status"></div>
      <section id="result" class="card" hidden></section>
      <div class="rec" id="rec"></div>
      <p class="hint">採用＝使える／対象外＝実在するが未採用／禁止＝不適切除外／未登録＝認識しない語。編集依頼はGitHubのIssue下書きを開くだけ（tokenなし）。最後に「Submit new issue」で送信され、AIが別PRで反映します。</p>
      <p class="hint" id="ver"></p>
    </main>
    <script>
      const REPO = "yonyon804/yofuke-works";
      const $ = (id) => document.getElementById(id);
      const state = { defs:null, cls:null, surf:null, ready:false, cur:null };
      const norm = (s) => (s || "").trim();
      const esc = (s) => (s||"").replace(/[<>&]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));

      async function load() {
        $("status").textContent = "辞書を読み込み中…";
        try {
          const [w, d, c] = await Promise.all([
            fetch("./words3.json",{cache:"no-store"}).then(r=>r.json()),
            fetch("./definitions3.json",{cache:"no-store"}).then(r=>r.json()),
            fetch("./classifications3.json",{cache:"no-store"}).then(r=>r.json()),
          ]);
          state.surf = new Map(w.map(x=>[x.r,x.s]));
          state.defs = d; state.cls = c; state.ready = true;
          $("status").textContent = `採用 ${w.length} 語・認識 ${Object.keys(c).length} 語ぶんを読み込み済み`;
          try { const m = await fetch("./vocabulary-manifest.json",{cache:"no-store"}).then(r=>r.json()); $("ver").textContent = "辞書版: " + (m.version||"-"); } catch(_){}
        } catch(e){ $("status").textContent = "辞書の読み込みに失敗: " + e.message; }
        renderRecent();
      }

      function classify(r){
        if (state.surf.has(r)) return {kind:"playable", cls:"playable", surface:state.surf.get(r), def:state.defs[r]||""};
        if (state.cls[r]==="prohibited") return {kind:"prohibited", cls:"prohibited"};
        if (state.cls[r]) return {kind:"oos", cls:state.cls[r]};
        return {kind:"unknown", cls:"unknown"};
      }

      function issueUrl(action, r, fields){
        const lines = [`<!-- dict-edit:v1 action=${action} reading=${r} -->`, "", "## 辞書編集リクエスト",
          `- アクション: ${({add:"追加(採用)",def:"意味変更",surface:"表記変更",remove:"削除"})[action]}`,
          `- 読み: ${r}`];
        if (fields.surface!=null) lines.push(`- 表記: ${fields.surface}`);
        if (fields.def!=null) lines.push(`- 意味: ${fields.def}`);
        lines.push("", "> 内容を確認して「Submit new issue」を押してください。AIが別PRで反映します。");
        const q = new URLSearchParams({ title:`[辞書編集/${action}] ${r}`, labels:`dict-edit,dict-edit:${action}`, body:lines.join("\n") });
        return `https://github.com/${REPO}/issues/new?${q.toString()}`;
      }

      function lookup(rRaw){
        const r = norm(rRaw); const res = $("result");
        if (!r){ res.hidden=true; return; }
        if (!state.ready) return;
        const c = classify(r); state.cur = {r, ...c};
        const badge = c.kind==="playable" ? ["b-ok","✅ 採用（ゲームで使える）"]
          : c.kind==="prohibited" ? ["b-ng","🚫 禁止（不適切として除外）"]
          : c.kind==="oos" ? ["b-oos","⛔ 対象外（実在するが未採用）"]
          : ["b-unk","❓ 未登録（辞書が認識しない）"];
        let html = `<span class="badge ${badge[0]}">${badge[1]}</span>`;
        html += `<div class="row"><span class="k">読み</span><span class="v">${esc(r)}</span></div>`;
        if (c.surface) html += `<div class="row"><span class="k">表記</span><span class="v">${esc(c.surface)}</span></div>`;
        if (c.def) html += `<div class="row"><span class="k">意味</span><span class="v">${esc(c.def)}</span></div>`;
        if (r.length!==3) html += `<div class="row"><span class="k"></span><span class="v" style="color:var(--warn)">※ このゲームは3文字。今は${r.length}文字</span></div>`;

        // アクション
        html += `<div class="acts" id="acts"></div><div class="edit" id="edit"></div>`;
        res.innerHTML = html; res.hidden=false;
        const acts = $("acts");
        if (c.kind==="playable"){
          acts.innerHTML = `<button class="btn" data-a="def">意味を変更</button>`+
            `<button class="btn" data-a="surface">表記を変更</button>`+
            `<button class="btn btn-danger" data-a="remove">削除する</button>`;
        } else {
          acts.innerHTML = `<button class="btn" data-a="add">この語を追加（採用）</button>`;
        }
        acts.querySelectorAll(".btn").forEach(b=>b.addEventListener("click",()=>chooseAction(b.dataset.a, b)));
        pushRecent(r);
      }

      function chooseAction(action, btn){
        document.querySelectorAll("#acts .btn").forEach(b=>b.classList.remove("sel")); btn.classList.add("sel");
        const c = state.cur; const edit = $("edit"); edit.style.display="block";
        if (action==="remove"){
          edit.innerHTML = `<p style="color:var(--ng)">「${esc(c.surface||c.r)}」（${esc(c.r)}）を辞書から外す依頼を送ります。</p>`+
            `<button class="send danger" id="send">GitHubへ削除を送信</button>`;
          $("send").onclick = ()=>open(issueUrl("remove", c.r, {}), "_blank", "noopener");
        } else if (action==="def"){
          edit.innerHTML = `<label>新しい意味（子ども向けに短く）</label><textarea id="f-def" rows="2">${esc(c.def||"")}</textarea>`+
            `<button class="send" id="send">GitHubへ意味変更を送信</button>`;
          $("send").onclick = ()=>{ const v=norm($("f-def").value); if(!v)return alert("意味を入れてください"); open(issueUrl("def", c.r, {def:v}), "_blank", "noopener"); };
        } else if (action==="surface"){
          edit.innerHTML = `<label>新しい表記</label><input id="f-s" value="${esc(c.surface||"")}" />`+
            `<label>意味（変えるなら。空欄なら現状維持）</label><textarea id="f-def" rows="2">${esc(c.def||"")}</textarea>`+
            `<button class="send" id="send">GitHubへ表記変更を送信</button>`;
          $("send").onclick = ()=>{ const s=norm($("f-s").value); if(!s)return alert("表記を入れてください"); open(issueUrl("surface", c.r, {surface:s, def:norm($("f-def").value)||null}), "_blank", "noopener"); };
        } else if (action==="add"){
          edit.innerHTML = `<label>表記（漢字/カタカナなど）</label><input id="f-s" value="${esc(c.r)}" />`+
            `<label>意味（子ども向けに短く）</label><textarea id="f-def" rows="2" placeholder="この語の意味"></textarea>`+
            `<button class="send" id="send">GitHubへ追加を送信</button>`;
          $("send").onclick = ()=>{ const s=norm($("f-s").value), d=norm($("f-def").value); if(!s||!d)return alert("表記と意味を入れてください"); open(issueUrl("add", c.r, {surface:s, def:d}), "_blank", "noopener"); };
        }
      }

      const RKEY="dictcheck-recent";
      function pushRecent(r){ try{ let a=JSON.parse(localStorage.getItem(RKEY)||"[]"); a=[r,...a.filter(x=>x!==r)].slice(0,12); localStorage.setItem(RKEY,JSON.stringify(a)); renderRecent(); }catch(_){} }
      function renderRecent(){ let a=[]; try{a=JSON.parse(localStorage.getItem(RKEY)||"[]")}catch(_){}; $("rec").innerHTML=a.map(r=>`<button class="chip" data-r="${esc(r)}">${esc(r)}</button>`).join(""); }
      $("rec").addEventListener("click",(e)=>{ const b=e.target.closest(".chip"); if(!b)return; $("q").value=b.dataset.r; lookup(b.dataset.r); });

      let t; $("q").addEventListener("input",(e)=>{ clearTimeout(t); t=setTimeout(()=>lookup(e.target.value),120); });
      load();
    </script>
  </body>
</html>
