<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <title>確認アンケート</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <header class="head">
        <h1 id="title" class="title">確認アンケート</h1>
        <div class="progress"><div id="bar" class="bar"></div></div>
        <p id="count" class="count"></p>
      </header>

      <section id="intro-screen" class="card" hidden>
        <p id="intro" class="intro"></p>
        <button id="start" class="btn btn-primary">はじめる</button>
      </section>

      <section id="q-screen" class="card" hidden>
        <p id="prompt" class="prompt"></p>
        <p id="context" class="context" hidden></p>
        <div id="options" class="options"></div>
        <div id="note-wrap" class="note-wrap" hidden>
          <label class="note-label" for="note">補足（任意）</label>
          <textarea id="note" class="note" rows="2" placeholder="ニュアンスがあれば"></textarea>
        </div>
        <div class="nav">
          <button id="back" class="btn btn-ghost">← 戻る</button>
          <button id="skip" class="btn btn-ghost">未回答で次へ →</button>
        </div>
      </section>

      <section id="done-screen" class="card" hidden>
        <h2 class="done-title">回答おつかれさまでした</h2>
        <p id="done-summary" class="context"></p>
        <button id="submit" class="btn btn-primary">GitHubへまとめて送信</button>
        <p class="hint">
          送信ボタンでGitHubのIssue作成画面が開きます。内容を確認して最後に「Submit new
          issue」を押してください。回答はここ（この端末）にも保存されており、途中で閉じても続きから再開できます。
        </p>
        <button id="review" class="btn btn-ghost">回答を見直す</button>
        <button id="reset" class="btn btn-ghost">最初からやり直す</button>
      </section>

      <section id="error-screen" class="card" hidden>
        <p id="error" class="error"></p>
      </section>
    </main>
    <script src="survey.js"></script>
  </body>
</html>
